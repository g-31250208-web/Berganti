<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengurusan Olahraga (4x100m & 4x200m)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        /* Print Specific Styles */
        @media print {
            body {
                background-color: white;
                padding: 0;
            }
            .no-print {
                display: none !important;
            }
            .print-only {
                display: block !important;
            }
            .print-container {
                width: 100%;
                margin: 0;
                padding: 0;
                box-shadow: none;
            }
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th, td {
                border: 1px solid #000 !important;
                padding: 8px !important;
                color: #000 !important;
            }
            /* Remove background colors for printing to save ink, except light grays */
            th {
                background-color: #f3f4f6 !important;
                -webkit-print-color-adjust: exact;
            }
            h1, h2, h3 {
                color: #000 !important;
            }
            .page-break {
                page-break-before: always;
            }
        }
        
        .print-only {
            display: none;
        }

        /* Custom Scrollbar for tables */
        .table-scroll::-webkit-scrollbar {
            height: 8px;
        }
        .table-scroll::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .table-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .table-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col md:flex-row overflow-hidden">

    <nav class="no-print bg-slate-900 text-white w-full md:w-64 flex-shrink-0 z-10 flex flex-col shadow-xl">
        <div class="p-4 border-b border-slate-700 flex items-center gap-3">
            <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            <h1 class="text-lg font-bold leading-tight">Sistem<br>Olahraga</h1>
        </div>
        
        <div class="flex-1 overflow-y-auto py-4 flex flex-row md:flex-col gap-2 px-2" id="nav-buttons">
            <button onclick="switchTab('pendaftaran')" id="nav-pendaftaran" class="w-full text-left px-4 py-3 rounded-lg transition-colors flex items-center gap-2 bg-blue-600 font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                <span class="hidden md:inline">Pendaftaran</span>
            </button>
            <button onclick="switchTab('jana')" id="nav-jana" class="w-full text-left px-4 py-3 rounded-lg transition-colors flex items-center gap-2 hover:bg-slate-800 text-slate-300">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                <span class="hidden md:inline">Jana Lorong</span>
            </button>
            <button onclick="switchTab('marshall')" id="nav-marshall" class="w-full text-left px-4 py-3 rounded-lg transition-colors flex items-center gap-2 hover:bg-slate-800 text-slate-300">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <span class="hidden md:inline">Borang Marshall</span>
            </button>
            <button onclick="switchTab('hakim')" id="nav-hakim" class="w-full text-left px-4 py-3 rounded-lg transition-colors flex items-center gap-2 hover:bg-slate-800 text-slate-300">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                <span class="hidden md:inline">Borang Hakim</span>
            </button>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto bg-slate-50 relative p-4 md:p-8" id="main-content">
        
        <!-- Controls Header -->
        <div class="no-print bg-white rounded-xl shadow-sm p-4 mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">Pilih Acara</label>
                <select id="event-selector" onchange="changeEvent(this.value)" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 min-w-[250px]">
                    <option value="4x100m Lelaki">4x100m Lelaki</option>
                    <option value="4x100m Perempuan">4x100m Perempuan</option>
                    <option value="4x200m Lelaki">4x200m Lelaki</option>
                    <option value="4x200m Perempuan">4x200m Perempuan</option>
                </select>
            </div>
            <div id="print-action" class="hidden">
                <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-5 rounded-lg flex items-center gap-2 transition">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    Cetak Borang
                </button>
            </div>
        </div>

        <!-- Dynamic Content Container -->
        <div id="tab-content" class="print-container">
            <!-- Content gets injected here by JS -->
        </div>

    </main>

    <!-- Custom Modal Structure -->
    <div id="custom-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300" id="custom-modal-content">
            <h3 class="text-xl font-bold text-gray-800 mb-2" id="modal-title">Pengesahan</h3>
            <p class="text-gray-600 mb-6" id="modal-message">Adakah anda pasti?</p>
            <div class="flex justify-end gap-3">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition font-medium">Batal</button>
                <button id="modal-confirm-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition font-medium">Teruskan</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 bg-emerald-500 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        <span id="toast-message" class="font-medium">Berjaya disimpan!</span>
    </div>

    <script>
        // Configuration
        const categories = ['4x100m Lelaki', '4x100m Perempuan', '4x200m Lelaki', '4x200m Perempuan'];
        const houses = [
            { id: 'merah', name: 'Merah', bg: 'bg-red-100', text: 'text-red-800', border: 'border-red-300', iconColor: 'text-red-500' },
            { id: 'biru', name: 'Biru', bg: 'bg-blue-100', text: 'text-blue-800', border: 'border-blue-300', iconColor: 'text-blue-500' },
            { id: 'hijau', name: 'Hijau', bg: 'bg-green-100', text: 'text-green-800', border: 'border-green-300', iconColor: 'text-green-500' },
            { id: 'kuning', name: 'Kuning', bg: 'bg-yellow-100', text: 'text-yellow-800', border: 'border-yellow-300', iconColor: 'text-yellow-500' }
        ];
        const teams = ['A', 'B'];

        // State Variables
        let currentTab = 'pendaftaran';
        let currentEvent = '4x100m Lelaki';
        let currentHouseReg = 'merah';
        let currentTeamReg = 'A';
        let eventsData = {};

        // Initialize Data Structure
        function initData() {
            categories.forEach(cat => {
                eventsData[cat] = [];
                houses.forEach(house => {
                    teams.forEach(team => {
                        eventsData[cat].push({
                            uid: `${cat}-${house.id}-${team}`.replace(/\s+/g, '-'),
                            houseId: house.id,
                            houseName: house.name,
                            houseTheme: { bg: house.bg, text: house.text, border: house.border, icon: house.iconColor },
                            teamName: team,
                            runners: ['', '', '', ''],
                            lane: null
                        });
                    });
                });
            });
            // Try load from local storage
            const saved = localStorage.getItem('olahragaData');
            if(saved) {
                try {
                    eventsData = JSON.parse(saved);
                } catch(e) { console.error("Error loading data", e); }
            }
        }

        function saveDataLocally() {
            localStorage.setItem('olahragaData', JSON.stringify(eventsData));
        }

        function switchTab(tabId) {
            currentTab = tabId;
            
            // Update Nav Styles
            const navButtons = ['pendaftaran', 'jana', 'marshall', 'hakim'];
            navButtons.forEach(id => {
                const btn = document.getElementById(`nav-${id}`);
                if (id === tabId) {
                    btn.className = 'w-full text-left px-4 py-3 rounded-lg transition-colors flex items-center gap-2 bg-blue-600 font-medium text-white shadow-md';
                } else {
                    btn.className = 'w-full text-left px-4 py-3 rounded-lg transition-colors flex items-center gap-2 hover:bg-slate-800 text-slate-300';
                }
            });

            // Show/Hide Print Button
            const printBtn = document.getElementById('print-action');
            if(tabId === 'marshall' || tabId === 'hakim') {
                printBtn.classList.remove('hidden');
            } else {
                printBtn.classList.add('hidden');
            }

            renderContent();
        }

        function changeEvent(eventName) {
            currentEvent = eventName;
            renderContent();
        }

        function renderContent() {
            const container = document.getElementById('tab-content');
            container.innerHTML = ''; // Clear current

            switch (currentTab) {
                case 'pendaftaran':
                    container.innerHTML = getPendaftaranHTML();
                    break;
                case 'jana':
                    container.innerHTML = getJanaLorongHTML();
                    break;
                case 'marshall':
                    container.innerHTML = getBorangMarshallHTML();
                    break;
                case 'hakim':
                    container.innerHTML = getBorangHakimHTML();
                    break;
            }
        }

        function getPendaftaranHTML() {
            const teamsData = eventsData[currentEvent];
            const activeHouse = houses.find(h => h.id === currentHouseReg);
            const teamData = teamsData.find(t => t.houseId === currentHouseReg && t.teamName === currentTeamReg);

            let html = `
                <div class="mb-4 no-print">
                    <h2 class="text-2xl font-bold text-gray-800">Pendaftaran Peserta</h2>
                    <p class="text-gray-500">Daftar pelari untuk acara <span class="font-semibold text-blue-600">${currentEvent}</span> mengikut Rumah Sukan dan Pasukan.</p>
                </div>
                
                <div class="mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-col sm:flex-row gap-4 no-print">
                    <div class="flex-1">
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Pilih Rumah Sukan</label>
                        <select onchange="changeHouseReg(this.value)" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 outline-none">
                            ${houses.map(h => `<option value="${h.id}" ${currentHouseReg === h.id ? 'selected' : ''}>Rumah ${h.name}</option>`).join('')}
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Pilih Pasukan</label>
                        <select onchange="changeTeamReg(this.value)" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 outline-none">
                            ${teams.map(t => `<option value="${t}" ${currentTeamReg === t ? 'selected' : ''}>Pasukan ${t}</option>`).join('')}
                        </select>
                    </div>
                </div>

                <div class="max-w-2xl no-print">
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="${activeHouse.bg} ${activeHouse.text} px-6 py-4 border-b border-gray-200 flex justify-between items-center transition-colors duration-300">
                            <span class="font-bold text-lg flex items-center gap-2">
                                <svg class="w-5 h-5 ${activeHouse.iconColor}" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3 6a3 3 0 013-3h10a1 1 0 01.8 1.6L14.25 8l2.55 3.4A1 1 0 0116 13H6a1 1 0 00-1 1v3a1 1 0 11-2 0V6z" clip-rule="evenodd"></path></svg>
                                Rumah ${activeHouse.name}
                            </span>
                            <span class="text-sm font-bold px-3 py-1 bg-white bg-opacity-75 rounded-full shadow-sm">Pasukan ${teamData.teamName}</span>
                        </div>
                        <div class="p-6 space-y-4">
            `;

            for(let i=0; i<4; i++) {
                html += `
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Pelari ${i+1}</label>
                                <input type="text" 
                                    onchange="updateRunnerName('${teamData.uid}', ${i}, this.value)"
                                    value="${teamData.runners[i]}" 
                                    placeholder="Masukkan nama penuh pelari ${i+1}..."
                                    class="w-full text-base rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-3 bg-gray-50 transition-colors hover:bg-white outline-none">
                            </div>
                `;
            }

            html += `
                        </div>
                    </div>
                </div>
            `;
            return html;
        }

        function changeHouseReg(val) {
            currentHouseReg = val;
            renderContent();
        }

        function changeTeamReg(val) {
            currentTeamReg = val;
            renderContent();
        }

        function updateRunnerName(uid, index, value) {
            const team = eventsData[currentEvent].find(t => t.uid === uid);
            if(team) {
                team.runners[index] = value;
                saveDataLocally();
            }
        }

        function getJanaLorongHTML() {
            const teamsData = eventsData[currentEvent];
            const isGenerated = teamsData.every(t => t.lane !== null);

            let html = `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 p-6 max-w-4xl mx-auto no-print">
                    <div class="text-center mb-8">
                        <h2 class="text-2xl font-bold text-gray-800 mb-2">Penjanaan Lorong Automatik</h2>
                        <p class="text-gray-500">Acara: <span class="font-semibold">${currentEvent}</span></p>
                        
                        <div class="mt-6">
                            <button onclick="confirmJanaLorong()" class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition hover:scale-105 flex items-center gap-2 mx-auto">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                                ${isGenerated ? 'Jana Semula Lorong Rawak' : 'Jana Lorong Sekarang'}
                            </button>
                        </div>
                    </div>
            `;

            if(isGenerated) {
                // Display Current Lanes mapped
                const sortedByLane = [...teamsData].sort((a,b) => a.lane - b.lane);
                html += `
                    <div class="mt-8 border-t border-gray-200 pt-6">
                        <h3 class="font-semibold text-lg mb-4 text-center">Keputusan Undian Lorong</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                `;
                
                sortedByLane.forEach(team => {
                    html += `
                        <div class="flex items-center p-4 bg-gray-50 border border-gray-100 rounded-lg">
                            <div class="flex-shrink-0 w-12 h-12 bg-slate-800 text-white rounded-full flex items-center justify-center font-bold text-xl mr-4 shadow-inner">
                                ${team.lane}
                            </div>
                            <div class="flex-1">
                                <div class="font-bold text-gray-800">Rumah ${team.houseName}</div>
                                <div class="text-sm text-gray-500">Pasukan ${team.teamName}</div>
                            </div>
                            <div class="w-4 h-4 rounded-full ${team.houseTheme.bg} ${team.houseTheme.border} border-2"></div>
                        </div>
                    `;
                });

                html += `</div></div>`;
            } else {
                html += `
                    <div class="mt-8 text-center p-8 bg-gray-50 rounded-lg border border-dashed border-gray-300">
                        <svg class="w-16 h-16 text-gray-300 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        <p class="text-gray-500">Lorong belum dijana. Klik butang di atas untuk mulakan undian lorong.</p>
                    </div>
                `;
            }

            html += `</div>`;
            return html;
        }

        let confirmAction = null;

        function confirmJanaLorong() {
            const teamsData = eventsData[currentEvent];
            const isGenerated = teamsData.every(t => t.lane !== null);
            
            let message = "Sistem akan menetapkan lorong 1 hingga 8 secara rawak untuk semua pasukan.";
            if(isGenerated) {
                message = "Lorong telah dijana sebelum ini. Adakah anda pasti untuk membuat janaan semula? Keputusan lama akan hilang.";
            }

            showModal("Pengesahan Jana Lorong", message, () => {
                executeJanaLorong();
            });
        }

        function executeJanaLorong() {
            let lanes = [1, 2, 3, 4, 5, 6, 7, 8];
            // Fisher-Yates Shuffle
            for (let i = lanes.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [lanes[i], lanes[j]] = [lanes[j], lanes[i]];
            }

            // Assign
            eventsData[currentEvent].forEach((team, idx) => {
                team.lane = lanes[idx];
            });
            saveDataLocally();

            renderContent();
            showToast("Lorong berjaya dijana secara rawak!");
        }

        function showModal(title, message, onConfirm) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            
            const modal = document.getElementById('custom-modal');
            const modalContent = document.getElementById('custom-modal-content');
            
            modal.classList.remove('hidden');
            // Small delay to allow display:block to apply before animating opacity
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);

            confirmAction = () => {
                closeModal();
                if(onConfirm) onConfirm();
            };

            document.getElementById('modal-confirm-btn').onclick = confirmAction;
        }

        function closeModal() {
            const modal = document.getElementById('custom-modal');
            const modalContent = document.getElementById('custom-modal-content');
            
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-message').textContent = msg;
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        function getBorangMarshallHTML() {
            const teamsData = eventsData[currentEvent];
            const isGenerated = teamsData.every(t => t.lane !== null);

            let html = `
                <div class="print-header hidden text-center mb-6">
                    <h1 class="text-2xl font-bold uppercase">Kejohanan Olahraga</h1>
                    <h2 class="text-xl font-semibold">Borang Penyelia Peserta (Marshall)</h2>
                    <p class="text-lg mt-2">Acara: <b>${currentEvent}</b></p>
                </div>
            `;

            if(!isGenerated) {
                return html + `
                    <div class="bg-yellow-50 text-yellow-800 p-4 rounded-lg border border-yellow-200 no-print">
                        Lorong belum dijana. Sila ke tab <b>Jana Lorong</b> untuk menetapkan lorong sebelum melihat borang ini.
                    </div>
                `;
            }

            const sortedByLane = [...teamsData].sort((a,b) => a.lane - b.lane);

            html += `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center no-print">
                        <h2 class="font-bold text-gray-800">Borang Marshall - ${currentEvent}</h2>
                    </div>
                    <div class="table-scroll overflow-x-auto p-4 md:p-6">
                        <table class="w-full text-left border-collapse min-w-[800px]">
                            <thead>
                                <tr class="bg-slate-800 text-white print-bg-gray">
                                    <th class="py-3 px-4 border border-slate-700 text-center w-20">Lorong</th>
                                    <th class="py-3 px-4 border border-slate-700 w-32">Rumah</th>
                                    <th class="py-3 px-4 border border-slate-700 text-center w-24">Pasukan</th>
                                    <th class="py-3 px-4 border border-slate-700">Pelari 1</th>
                                    <th class="py-3 px-4 border border-slate-700">Pelari 2</th>
                                    <th class="py-3 px-4 border border-slate-700">Pelari 3</th>
                                    <th class="py-3 px-4 border border-slate-700">Pelari 4</th>
                                </tr>
                            </thead>
                            <tbody class="text-sm">
            `;

            sortedByLane.forEach(team => {
                const getRunner = (i) => team.runners[i] && team.runners[i].trim() !== '' ? team.runners[i] : '<span class="text-gray-300 italic no-print">-Tiada Nama-</span>';
                
                html += `
                    <tr class="border-b hover:bg-gray-50 transition">
                        <td class="py-3 px-4 border text-center font-bold text-lg">${team.lane}</td>
                        <td class="py-3 px-4 border font-semibold">${team.houseName}</td>
                        <td class="py-3 px-4 border text-center">${team.teamName}</td>
                        <td class="py-3 px-4 border">${getRunner(0)}</td>
                        <td class="py-3 px-4 border">${getRunner(1)}</td>
                        <td class="py-3 px-4 border">${getRunner(2)}</td>
                        <td class="py-3 px-4 border">${getRunner(3)}</td>
                    </tr>
                `;
            });

            html += `
                            </tbody>
                        </table>
                    </div>
                    <div class="p-6 print-only mt-8">
                        <div class="flex justify-between items-end">
                            <div>
                                <p class="mb-8">Disediakan oleh:</p>
                                <p>....................................................</p>
                                <p class="text-sm text-gray-500">(Tandatangan Penyelia)</p>
                            </div>
                            <div>
                                <p class="mb-8">Disahkan oleh:</p>
                                <p>....................................................</p>
                                <p class="text-sm text-gray-500">(Tandatangan Referi)</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            return html;
        }

        function getBorangHakimHTML() {
            const teamsData = eventsData[currentEvent];
            const isGenerated = teamsData.every(t => t.lane !== null);

            let html = `
                <div class="print-header hidden text-center mb-6">
                    <h1 class="text-2xl font-bold uppercase">Kejohanan Olahraga</h1>
                    <h2 class="text-xl font-semibold">Borang Hakim Penamat & Pencatat Masa</h2>
                    <p class="text-lg mt-2">Acara: <b>${currentEvent}</b></p>
                </div>
            `;

            if(!isGenerated) {
                return html + `
                    <div class="bg-yellow-50 text-yellow-800 p-4 rounded-lg border border-yellow-200 no-print">
                        Lorong belum dijana. Sila ke tab <b>Jana Lorong</b> untuk menetapkan lorong sebelum melihat borang ini.
                    </div>
                `;
            }

            const sortedByLane = [...teamsData].sort((a,b) => a.lane - b.lane);

            html += `
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="p-4 bg-gray-50 border-b border-gray-200 flex justify-between items-center no-print">
                        <h2 class="font-bold text-gray-800">Borang Hakim Penamat - ${currentEvent}</h2>
                    </div>
                    <div class="table-scroll overflow-x-auto p-4 md:p-6">
                        <table class="w-full text-left border-collapse min-w-[700px]">
                            <thead>
                                <tr class="bg-indigo-900 text-white print-bg-gray">
                                    <th class="py-4 px-4 border border-indigo-800 text-center w-20">Lorong</th>
                                    <th class="py-4 px-4 border border-indigo-800 w-40">Rumah / Pasukan</th>
                                    <th class="py-4 px-4 border border-indigo-800 text-center w-40">Catatan Masa</th>
                                    <th class="py-4 px-4 border border-indigo-800 text-center w-32">Kedudukan</th>
                                    <th class="py-4 px-4 border border-indigo-800 w-48">Catatan Tambahan</th>
                                </tr>
                            </thead>
                            <tbody class="text-gray-800">
            `;

            sortedByLane.forEach(team => {
                html += `
                    <tr>
                        <td class="py-5 px-4 border text-center font-bold text-xl bg-gray-50">${team.lane}</td>
                        <td class="py-5 px-4 border font-medium">Rumah ${team.houseName} <br><span class="text-sm text-gray-500">Pasukan ${team.teamName}</span></td>
                        <td class="py-5 px-4 border"></td>
                        <td class="py-5 px-4 border"></td>
                        <td class="py-5 px-4 border"></td>
                    </tr>
                `;
            });

            html += `
                            </tbody>
                        </table>
                    </div>
                    <div class="p-6 print-only mt-8">
                        <div class="grid grid-cols-3 gap-8 text-center mt-12">
                            <div>
                                <p class="border-t border-black pt-2 w-3/4 mx-auto">(Hakim Penamat 1)</p>
                            </div>
                            <div>
                                <p class="border-t border-black pt-2 w-3/4 mx-auto">(Hakim Penamat 2)</p>
                            </div>
                            <div>
                                <p class="border-t border-black pt-2 w-3/4 mx-auto">(Ketua Hakim)</p>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            return html;
        }

        window.onload = function() {
            initData();
            switchTab('pendaftaran'); // Initial view
        };
    </script>
