<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Pengurusan Olahraga (4x100m & 4x200m)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }

        /* Print Specific Styles */
        @media print {
            body {
                background-color: white;
                padding: 0;
            }
            .no-print {
                display: none !important;
            }
            .print-only {
                display: block !important;
            }
            .print-container {
                width: 100%;
                margin: 0;
                padding: 0;
                box-shadow: none;
            }
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th, td {
                border: 1px solid #000 !important;
                padding: 8px !important;
                color: #000 !important;
            }
            th {
                background-color: #f3f4f6 !important;
                -webkit-print-color-adjust: exact;
            }
            h1, h2, h3 {
                color: #000 !important;
            }
            .page-break {
                page-break-before: always;
            }
        }
        
        .print-only {
            display: none;
        }

        /* Custom Scrollbar for tables */
        .table-scroll::-webkit-scrollbar {
            height: 8px;
        }
        .table-scroll::-webkit-scrollbar-track {
            background: #f1f1f1; 
            border-radius: 4px;
        }
        .table-scroll::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        .table-scroll::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col md:flex-row overflow-hidden">

    <nav class="no-print bg-slate-900 text-white w-full md:w-64 flex-shrink-0 z-10 flex flex-col shadow-xl">
        <div class="p-4 border-b border-slate-700 flex items-center gap-3">
            <img src="https://lh3.googleusercontent.com/d/1E8tjAd7j9DJaZgngDn38agUFCvwyUffa" alt="Logo Sekolah" class="w-12 h-12 object-contain bg-white rounded-full p-0.5" crossorigin="anonymous" onerror="this.onerror=null; this.src='https://placehold.co/48x48/ffffff/000000?text=LOGO';">
            <h1 class="text-lg font-bold leading-tight">Sistem<br>Olahraga</h1>
        </div>
        
        <div class="flex-1 overflow-y-auto py-4 flex flex-row md:flex-col gap-2 px-2" id="nav-buttons">
            <button onclick="switchTab('pendaftaran')" id="nav-pendaftaran" class="w-full text-left px-4 py-3 rounded-lg transition-colors flex items-center gap-2 bg-blue-600 font-medium">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                <span class="hidden md:inline">Pendaftaran</span>
            </button>
            <button onclick="switchTab('jana')" id="nav-jana" class="w-full text-left px-4 py-3 rounded-lg transition-colors flex items-center gap-2 hover:bg-slate-800 text-slate-300">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                <span class="hidden md:inline">Jana Lorong</span>
            </button>
            <button onclick="switchTab('marshall')" id="nav-marshall" class="w-full text-left px-4 py-3 rounded-lg transition-colors flex items-center gap-2 hover:bg-slate-800 text-slate-300">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <span class="hidden md:inline">Borang Marshall</span>
            </button>
            <button onclick="switchTab('hakim')" id="nav-hakim" class="w-full text-left px-4 py-3 rounded-lg transition-colors flex items-center gap-2 hover:bg-slate-800 text-slate-300">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                <span class="hidden md:inline">Borang Hakim</span>
            </button>
            <button onclick="openConfigModal()" class="w-full text-left px-4 py-3 rounded-lg transition-colors flex items-center gap-2 hover:bg-slate-800 text-cyan-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span class="hidden md:inline">Tetapan Google Sheet</span>
            </button>
        </div>
        
        <div class="p-2 border-t border-slate-700">
            <a href="https://g-31250208-web.github.io/sps/" class="w-full text-left px-4 py-3 rounded-lg transition-all flex items-center gap-2 bg-gradient-to-r from-amber-500 to-orange-600 hover:from-amber-600 hover:to-orange-700 text-white font-medium shadow-md">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                <span class="hidden md:inline">Papan Pemuka</span>
            </a>
        </div>
    </nav>

    <main class="flex-1 overflow-y-auto bg-slate-50 relative p-4 md:p-8" id="main-content">
        <div class="no-print bg-white rounded-xl shadow-sm p-4 mb-6 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4 w-full sm:w-auto">
                <div class="flex-1">
                    <label class="block text-sm font-semibold text-gray-600 mb-1">Pilih Acara</label>
                    <select id="event-selector" onchange="changeEvent(this.value)" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 min-w-[250px]">
                        <option value="4x100m Lelaki">4x100m Lelaki</option>
                        <option value="4x100m Perempuan">4x100m Perempuan</option>
                        <option value="4x200m Lelaki">4x200m Lelaki</option>
                        <option value="4x200m Perempuan">4x200m Perempuan</option>
                    </select>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div id="sync-status" class="text-xs font-medium px-3 py-1.5 rounded-full bg-slate-100 text-slate-600 flex items-center gap-1.5">
                    <span class="w-2 h-2 rounded-full bg-slate-400" id="sync-dot"></span>
                    <span id="sync-text">Sedia</span>
                </div>
                <div id="print-action" class="hidden">
                    <button onclick="window.print()" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-5 rounded-lg flex items-center gap-2 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                        Cetak Borang
                    </button>
                </div>
            </div>
        </div>

        <div id="tab-content" class="print-container">
            <!-- Content gets injected here by JS -->
        </div>

    </main>

    <div id="config-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-md w-full mx-4 transform scale-95 transition-transform duration-300" id="config-modal-content">
            <h3 class="text-xl font-bold text-gray-800 mb-2">Tetapan Pautan Google Sheet</h3>
            <p class="text-gray-600 text-sm mb-4">Masukkan URL Web App Google Apps Script anda di bawah untuk membolehkan auto-sync ke Google Sheets.</p>
            <div class="mb-4">
                <label class="block text-sm font-semibold text-gray-700 mb-1">URL Web App</label>
                <input type="text" id="script-url-input" placeholder="https://script.google.com/macros/s/.../exec" class="w-full text-sm rounded-md border-gray-300 shadow-sm border p-2.5 outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex justify-end gap-3">
                <button onclick="closeConfigModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition font-medium text-sm">Batal</button>
                <button onclick="saveScriptUrl()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition font-medium text-sm">Simpan & Muat Turun</button>
            </div>
        </div>
    </div>

    <!-- Custom Modal Structure -->
    <div id="custom-modal" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center z-50 hidden opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-xl shadow-2xl p-6 max-w-sm w-full mx-4 transform scale-95 transition-transform duration-300" id="custom-modal-content">
            <h3 class="text-xl font-bold text-gray-800 mb-2" id="modal-title">Pengesahan</h3>
            <p class="text-gray-600 mb-6" id="modal-message">Adakah anda pasti?</p>
            <div class="flex justify-end gap-3">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg transition font-medium">Batal</button>
                <button id="modal-confirm-btn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition font-medium">Teruskan</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-5 right-5 bg-emerald-500 text-white px-6 py-3 rounded-lg shadow-lg transform translate-y-20 opacity-0 transition-all duration-300 z-50 flex items-center gap-3">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
        <span id="toast-message" class="font-medium">Berjaya disimpan!</span>
    </div>

    <script>
        // Configuration
        const categories = ['4x100m Lelaki', '4x100m Perempuan', '4x200m Lelaki', '4x200m Perempuan'];
        const houses = [
            { id: 'merah', name: 'Merah', bg: 'bg-red-100', text: 'text-red-800', border: 'border-red-300', iconColor: 'text-red-500' },
            { id: 'biru', name: 'Biru', bg: 'bg-blue-100', text: 'text-blue-800', border: 'border-blue-300', iconColor: 'text-blue-500' },
            { id: 'hijau', name: 'Hijau', bg: 'bg-green-100', text: 'text-green-800', border: 'border-green-300', iconColor: 'text-green-500' },
            { id: 'kuning', name: 'Kuning', bg: 'bg-yellow-100', text: 'text-yellow-800', border: 'border-yellow-300', iconColor: 'text-yellow-500' }
        ];
        const teams = ['A', 'B'];
        const DEFAULT_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxc4gm8QLhGNOj1wyCNAbNa3mNVppyoik7Gnf9eMjVZfXKZEba2Bmnt31BQQcaUYjsO/exec';

        // State Variables
        let currentTab = 'pendaftaran';
        let currentEvent = '4x100m Lelaki';
        let currentHouseReg = 'merah';
        let currentTeamReg = 'A';
        let eventsData = {};
        let syncTimeout = null;

        // Ensure data structure integrity
        function ensureDataStructure() {
            if (!eventsData || typeof eventsData !== 'object') {
                eventsData = {};
            }
            categories.forEach(cat => {
                if (!eventsData[cat] || !Array.isArray(eventsData[cat])) {
                    eventsData[cat] = [];
                }
                houses.forEach(house => {
                    teams.forEach(team => {
                        let existing = eventsData[cat].find(t => t.houseId === house.id && t.teamName === team);
                        if (!existing) {
                            eventsData[cat].push({
                                uid: `${cat}-${house.id}-${team}`.replace(/\s+/g, '-'),
                                houseId: house.id,
                                houseName: house.name,
                                houseTheme: { bg: house.bg, text: house.text, border: house.border, icon: house.iconColor },
                                teamName: team,
                                runners: ['', '', '', ''],
                                lane: null
                            });
                        } else {
                            if (!existing.runners || !Array.isArray(existing.runners)) {
                                existing.runners = ['', '', '', ''];
                            }
                            existing.houseTheme = { bg: house.bg, text: house.text, border: house.border, icon: house.iconColor };
                        }
                    });
                });
            });
        }

        // Initialize Data Structure & Cloud Load
        async function initData() {
            ensureDataStructure();

            const saved = localStorage.getItem('olahragaData');
            if(saved) {
                try {
                    eventsData = JSON.parse(saved);
                    ensureDataStructure();
                } catch(e) { console.error("Error loading local data", e); }
            }

            const scriptUrl = localStorage.getItem('olahraga_script_url') || DEFAULT_SCRIPT_URL;
            if(scriptUrl) {
                await loadFromCloud(scriptUrl);
            } else {
                renderContent();
            }
        }

        async function loadFromCloud(url) {
            updateSyncStatus('syncing', 'Memuat turun...');
            try {
                const response = await fetch(`${url}?action=load`);
                const result = await response.json();
                if(result.status === 'success' && result.data) {
                    eventsData = result.data;
                    ensureDataStructure();
                    saveDataLocally();
                    renderContent();
                    updateSyncStatus('success', 'Diselaraskan ✓');
                } else {
                    ensureDataStructure();
                    renderContent();
                    updateSyncStatus('success', 'Sedia (Lokal)');
                }
            } catch(e) {
                console.error("Cloud load error:", e);
                ensureDataStructure();
                renderContent();
                updateSyncStatus('success', 'Mod Luar Talian');
            }
        }

        function triggerAutoSync() {
            saveDataLocally();
            
            const scriptUrl = localStorage.getItem('olahraga_script_url') || DEFAULT_SCRIPT_URL;
            if (!scriptUrl) return;

            updateSyncStatus('syncing', 'Menyimpan...');
            if (syncTimeout) clearTimeout(syncTimeout);

            syncTimeout = setTimeout(async () => {
                try {
                    const response = await fetch(scriptUrl, {
                        method: 'POST',
                        body: JSON.stringify(eventsData)
                    });
                    const result = await response.json();
                    if(result.status === 'success') {
                        updateSyncStatus('success', 'Diselaraskan ✓');
                    } else {
                        updateSyncStatus('error', 'Ralat Simpan ✗');
                    }
                } catch(e) {
                    console.error("Cloud sync error:", e);
                    updateSyncStatus('error', 'Ralat Rangkaian ✗');
                }
            }, 1000);
        }

        function updateSyncStatus(state, text) {
            const dot = document.getElementById('sync-dot');
            const label = document.getElementById('sync-text');
            if(!dot || !label) return;
            
            label.textContent = text;
            if(state === 'syncing') {
                dot.className = 'w-2 h-2 rounded-full bg-amber-500 animate-pulse';
            } else if(state === 'success') {
                dot.className = 'w-2 h-2 rounded-full bg-emerald-500';
            } else {
                dot.className = 'w-2 h-2 rounded-full bg-rose-500';
            }
        }

        function saveDataLocally() {
            localStorage.setItem('olahragaData', JSON.stringify(eventsData));
        }

        function openConfigModal() {
            const modal = document.getElementById('config-modal');
            const modalContent = document.getElementById('config-modal-content');
            document.getElementById('script-url-input').value = localStorage.getItem('olahraga_script_url') || DEFAULT_SCRIPT_URL;
            
            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContent.classList.remove('scale-95');
            }, 10);
        }

        function closeConfigModal() {
            const modal = document.getElementById('config-modal');
            const modalContent = document.getElementById('config-modal-content');
            
            modal.classList.add('opacity-0');
            modalContent.classList.add('scale-95');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        async function saveScriptUrl() {
            const url = document.getElementById('script-url-input').value.trim();
            if(url) {
                localStorage.setItem('olahraga_script_url', url);
                closeConfigModal();
                showToast("URL Web App disimpan!");
                await loadFromCloud(url);
            } else {
                localStorage.removeItem('olahraga_script_url');
                closeConfigModal();
                showToast("URL dipadam.");
                updateSyncStatus('success', 'Sedia (Lokal)');
            }
        }

        function switchTab(tabId) {
            currentTab = tabId;
            
            const navButtons = ['pendaftaran', 'jana', 'marshall', 'hakim'];
            navButtons.forEach(id => {
                const btn = document.getElementById(`nav-${id}`);
                if (id === tabId) {
                    btn.className = 'w-full text-left px-4 py-3 rounded-lg transition-colors flex items-center gap-2 bg-blue-600 font-medium text-white shadow-md';
                } else {
                    btn.className = 'w-full text-left px-4 py-3 rounded-lg transition-colors flex items-center gap-2 hover:bg-slate-800 text-slate-300';
                }
            });

            const printBtn = document.getElementById('print-action');
            if(tabId === 'marshall' || tabId === 'hakim') {
                printBtn.classList.remove('hidden');
            } else {
                printBtn.classList.add('hidden');
            }

            renderContent();
        }

        function changeEvent(eventName) {
            currentEvent = eventName;
            renderContent();
        }

        function renderContent() {
            ensureDataStructure();
            const container = document.getElementById('tab-content');
            container.innerHTML = '';

            switch (currentTab) {
                case 'pendaftaran':
                    container.innerHTML = getPendaftaranHTML();
                    break;
                case 'jana':
                    container.innerHTML = getJanaLorongHTML();
                    break;
                case 'marshall':
                    container.innerHTML = getBorangMarshallHTML();
                    break;
                case 'hakim':
                    container.innerHTML = getBorangHakimHTML();
                    break;
            }
        }

        function getPendaftaranHTML() {
            const teamsData = eventsData[currentEvent];
            const activeHouse = houses.find(h => h.id === currentHouseReg);
            const teamData = teamsData.find(t => t.houseId === currentHouseReg && t.teamName === currentTeamReg);

            let html = `
                <div class="mb-4 no-print">
                    <h2 class="text-2xl font-bold text-gray-800">Pendaftaran Peserta</h2>
                    <p class="text-gray-500">Daftar pelari untuk acara <span class="font-semibold text-blue-600">${currentEvent}</span> mengikut Rumah Sukan dan Pasukan.</p>
                </div>
                
                <div class="mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-col sm:flex-row gap-4 no-print">
                    <div class="flex-1">
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Pilih Rumah Sukan</label>
                        <select onchange="changeHouseReg(this.value)" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 outline-none">
                            ${houses.map(h => `<option value="${h.id}" ${currentHouseReg === h.id ? 'selected' : ''}>Rumah ${h.name}</option>`).join('')}
                        </select>
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-semibold text-gray-600 mb-1">Pilih Pasukan</label>
                        <select onchange="changeTeamReg(this.value)" class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 outline-none">
                            ${teams.map(t => `<option value="${t}" ${currentTeamReg === t ? 'selected' : ''}>Pasukan ${t}</option>`).join('')}
                        </select>
                    </div>
                </div>

                <div class="max-w-2xl no-print">
                    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                        <div class="${activeHouse.bg} ${activeHouse.text} px-6 py-4 border-b border-gray-200 flex justify-between items-center transition-colors duration-300">
                            <span class="font-bold text-lg flex items-center gap-2">
                                <svg class="w-5 h-5 ${activeHouse.iconColor}" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M3 6a3 3 0 013-3h10a1 1 0 01.8 1.6L14.25 8l2.55 3.4A1 1 0 0116 13H6a1 1 0 00-1 1v3a1 1 0 11-2 0V6z" clip-rule="evenodd"></path></svg>
                                Rumah ${activeHouse.name}
                            </span>
                            <span class="text-sm font-bold px-3 py-1 bg-white bg-opacity-75 rounded-full shadow-sm">Pasukan ${teamData.teamName}</span>
                        </div>
                        <div class="p-6 space-y-4">
            `;

            for(let i=0; i<4; i++) {
                html += `
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">Pelari ${i+1}</label>
                                <input type="text" 
                                    onchange="updateRunnerName('${teamData.uid}', ${i}, this.value)"
                                    value="${teamData.runners[i]}" 
                                    placeholder="Masukkan nama penuh pelari ${i+1}..."
                                    class="w-full text-base rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 border p-3 bg-gray-50 transition-colors hover:bg-white outline-none">

        function confirmJanaLorong() {
            const teamsData = eventsData[currentEvent];
            const isGenerated = teamsData.some(t => t.lane !== null);
            
            let message = "Sistem akan menetapkan lorong secara automatik dan mengosongkan lorong luar serta mengelakkan rumah sama bersebelahan.";
            if(isGenerated) {
                message = "Lorong telah dijana sebelum ini. Adakah anda pasti untuk membuat janaan semula?";

            showModal("Pengesahan Jana Lorong", message, () => {

        function executeJanaLorong() {
            let allTeams = eventsData[currentEvent];
            
            // Reset all lanes to null
            allTeams.forEach(t => t.lane = null);

            // Filter active teams (teams with at least one runner name entered)
            let activeTeams = allTeams.filter(t => t.runners.some(r => r && r.trim() !== ''));
            if (activeTeams.length === 0) {
                activeTeams = [...allTeams]; // Fallback to all if none entered
            }

            let n = activeTeams.length;
            let availableLanes = [];
            for (let i = 1; i <= n; i++) {
                availableLanes.push(i);
            }

            // Shuffle & verify no adjacent same-house teams
            let valid = false;
            let bestAssignment = null;
            let attempts = 0;

            while (!valid && attempts < 1500) {
                attempts++;
                let shuffledLanes = [...availableLanes];
                for (let i = shuffledLanes.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledLanes[i], shuffledLanes[j]] = [shuffledLanes[j], shuffledLanes[i]];
                }

                let hasAdjacentSameHouse = false;
                let assignment = activeTeams.map((team, idx) => ({
                    team: team,
                    lane: shuffledLanes[idx]
                }));

                assignment.sort((a, b) => a.lane - b.lane);

                for (let i = 0; i < assignment.length - 1; i++) {
                    if (assignment[i+1].lane === assignment[i].lane + 1) {
                        if (assignment[i].team.houseId === assignment[i+1].team.houseId) {
                            hasAdjacentSameHouse = true;
                            break;
                        }
                    }
                }

                if (!hasAdjacentSameHouse) {
                    valid = true;
                    bestAssignment = assignment;
                }
            }

            if (!valid) {
                let shuffledLanes = [...availableLanes];
                for (let i = shuffledLanes.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [shuffledLanes[i], shuffledLanes[j]] = [shuffledLanes[j], shuffledLanes[i]];
                }
                bestAssignment = activeTeams.map((team, idx) => ({
                    team: team,
                    lane: shuffledLanes[idx]
                }));
            }

            bestAssignment.forEach(item => {
                let targetTeam = allTeams.find(t => t.uid === item.team.uid);
                if (targetTeam) {
                    targetTeam.lane = item.lane;
                }
            });

            triggerAutoSync();
            renderContent();
            showToast("Lorong berjaya dijana & diselaraskan!");
        }
